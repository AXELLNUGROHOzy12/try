<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hubungkan WhatsApp</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0 }
  body {
    background: #0f1117;
    color: #e2e8f0;
    font-family: 'Segoe UI', system-ui, sans-serif;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
    gap: 0;
  }
  .card {
    background: #1a1d27;
    border: 1px solid #2d3148;
    border-radius: 20px;
    padding: 36px 32px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
    max-width: 380px;
    width: 100%;
  }
  h1 { font-size: 20px; font-weight: 700; display: flex; align-items: center; gap: 8px }
  p  { font-size: 14px; color: #8892a4; text-align: center; line-height: 1.6 }

  #qr-box {
    width: 220px; height: 220px;
    background: #fff;
    border-radius: 12px;
    display: grid;
    place-items: center;
    overflow: hidden;
  }
  #qr-box img { width: 210px; height: 210px; display: block; object-fit: contain }

  .status {
    font-size: 13px;
    padding: 6px 16px;
    border-radius: 20px;
    font-weight: 600;
  }
  .status.waiting    { background: #1e3a5f; color: #60a5fa }
  .status.connected  { background: #14532d; color: #4ade80 }
  .status.loggedout  { background: #3b1515; color: #f87171 }
  .status.loading    { background: #22263a; color: #8892a4 }

  .steps { list-style: none; text-align: left; display: flex; flex-direction: column; gap: 8px; width: 100% }
  .steps li { font-size: 13px; color: #8892a4; display: flex; gap: 8px }
  .steps li b { color: #6c63ff; flex-shrink: 0 }

  a.back { color: #6c63ff; font-size: 13px; text-decoration: none; margin-top: 4px }
  a.back:hover { text-decoration: underline }
</style>
</head>
<body>
<div class="card">
  <h1>
    <svg width="22" height="22" viewBox="0 0 24 24" fill="#25d366"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
    Hubungkan WhatsApp
  </h1>

  <div id="qr-box">
    <img id="qr-img" alt="QR Code" style="display:none">
  </div>

  <div id="status" class="status loading">Memuat...</div>

  <ol class="steps">
    <li><b>1.</b> Buka WhatsApp di HP</li>
    <li><b>2.</b> Ketuk ⋮ (menu) → Perangkat Tertaut</li>
    <li><b>3.</b> Ketuk "Tautkan Perangkat"</li>
    <li><b>4.</b> Arahkan kamera ke QR di atas</li>
  </ol>

  <a class="back" href="/">← Kembali ke chat</a>
</div>

<script>
const statusEl = document.getElementById('status')
const qrImg    = document.getElementById('qr-img')
const qrBox    = document.getElementById('qr-box')

function setStatus(s) {
  statusEl.className = 'status ' + s
  const labels = {
    waiting:   '⏳ Menunggu scan...',
    connected: '✅ WhatsApp Terhubung!',
    loggedout: '❌ Logged out — refresh untuk QR baru',
    loading:   '⏳ Memuat QR...',
    error:     '⚠️ Gagal memuat QR — coba refresh'
  }
  statusEl.textContent = labels[s] || s
}

async function poll() {
  try {
    const res  = await fetch('/qr-data')
    const data = await res.json()

    if (data.status === 'connected') {
      setStatus('connected')
      qrImg.style.display = 'none'
      qrBox.style.background = '#14532d'
      qrBox.innerHTML = '<span style="font-size:56px">✅</span>'
      return
    }

    if (data.status === 'loggedout') {
      setStatus('loggedout')
      return
    }

    if (data.status === 'waiting') {
      // Muat gambar PNG dari server — pakai cache-bust supaya selalu fresh
      qrImg.src = '/qr-image?t=' + Date.now()
      qrImg.style.display = 'block'
      setStatus('waiting')
    } else {
      setStatus('loading')
    }
  } catch {
    setStatus('error')
  }
  setTimeout(poll, 3000)
}

poll()
</script>
</body>
</html>
