<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nova AI Chat</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0 }
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #22263a;
    --accent: #6c63ff;
    --accent2: #a78bfa;
    --user-bubble: #6c63ff;
    --ai-bubble: #22263a;
    --text: #e2e8f0;
    --sub: #8892a4;
    --border: #2d3148;
    --green: #25d366;
  }
  body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; height: 100dvh; display: flex; flex-direction: column }

  /* ── Header ── */
  header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 14px 20px; display: flex; align-items: center; gap: 12px; flex-shrink: 0 }
  .avatar { width: 40px; height: 40px; border-radius: 50%; background: linear-gradient(135deg, var(--accent), var(--accent2)); display: grid; place-items: center; font-size: 20px; flex-shrink: 0 }
  .header-info { flex: 1 }
  .header-info h1 { font-size: 16px; font-weight: 600 }
  .header-info span { font-size: 12px; color: var(--sub) }
  .wa-btn { background: var(--green); color: #fff; border: none; border-radius: 20px; padding: 7px 14px; font-size: 13px; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 6px; text-decoration: none; white-space: nowrap }
  .wa-btn:hover { opacity: .88 }

  /* ── Chat area ── */
  #chat { flex: 1; overflow-y: auto; padding: 20px 16px; display: flex; flex-direction: column; gap: 12px; scroll-behavior: smooth }
  #chat::-webkit-scrollbar { width: 4px }
  #chat::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px }

  .msg { display: flex; flex-direction: column; max-width: 78% }
  .msg.user { align-self: flex-end; align-items: flex-end }
  .msg.ai   { align-self: flex-start; align-items: flex-start }

  .bubble { padding: 10px 14px; border-radius: 18px; line-height: 1.55; font-size: 14.5px; word-break: break-word; white-space: pre-wrap }
  .msg.user .bubble { background: var(--user-bubble); color: #fff; border-bottom-right-radius: 4px }
  .msg.ai   .bubble { background: var(--ai-bubble); border-bottom-left-radius: 4px }

  .time { font-size: 11px; color: var(--sub); margin-top: 4px; padding: 0 4px }

  .typing .bubble { display: flex; gap: 5px; padding: 14px 16px }
  .dot { width: 7px; height: 7px; background: var(--sub); border-radius: 50%; animation: blink 1.2s ease-in-out infinite }
  .dot:nth-child(2) { animation-delay: .2s }
  .dot:nth-child(3) { animation-delay: .4s }
  @keyframes blink { 0%,80%,100%{opacity:.25} 40%{opacity:1} }

  /* ── Input ── */
  .input-wrap { background: var(--surface); border-top: 1px solid var(--border); padding: 12px 16px; display: flex; gap: 10px; align-items: flex-end; flex-shrink: 0 }
  #inp { flex: 1; background: var(--surface2); border: 1px solid var(--border); border-radius: 22px; color: var(--text); font-size: 14px; padding: 10px 16px; resize: none; max-height: 120px; outline: none; font-family: inherit; line-height: 1.4 }
  #inp:focus { border-color: var(--accent) }
  #inp::placeholder { color: var(--sub) }
  #send { width: 42px; height: 42px; border-radius: 50%; background: var(--accent); border: none; color: #fff; cursor: pointer; display: grid; place-items: center; flex-shrink: 0; transition: background .15s }
  #send:hover { background: var(--accent2) }
  #send:disabled { background: var(--surface2); cursor: default }
  #send svg { width: 18px; height: 18px }

  /* ── Gate (minta kode akses) ── */
  #gate { position: fixed; inset: 0; background: rgba(10,11,16,.92); display: flex; align-items: center; justify-content: center; z-index: 50; padding: 20px }
  #gate.hidden { display: none }
  .gate-box { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 24px; width: 100%; max-width: 320px; text-align: center }
  .gate-box h2 { font-size: 16px; margin-bottom: 6px }
  .gate-box p { font-size: 13px; color: var(--sub); margin-bottom: 16px }
  .gate-box input { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; color: var(--text); padding: 10px 12px; font-size: 14px; margin-bottom: 10px; outline: none }
  .gate-box input:focus { border-color: var(--accent) }
  .gate-box button { width: 100%; background: var(--accent); border: none; color: #fff; border-radius: 10px; padding: 10px; font-size: 14px; font-weight: 600; cursor: pointer }
  .gate-box button:hover { background: var(--accent2) }
  .gate-err { color: #f87171; font-size: 12.5px; margin-top: 8px; min-height: 16px }
</style>
</head>
<body>
<div id="gate">
  <div class="gate-box">
    <h2>🔒 Akses Terbatas</h2>
    <p>Masukkan kode akses untuk mulai chat dengan Nova AI.</p>
    <input type="password" id="gateInput" placeholder="Kode akses" autocomplete="off">
    <button id="gateBtn">Masuk</button>
    <div class="gate-err" id="gateErr"></div>
  </div>
</div>
<header>
  <div class="avatar">🤖</div>
  <div class="header-info">
    <h1 id="ai-name">Nova AI</h1>
    <span id="status-text">Online</span>
  </div>
  <a class="wa-btn" href="/qr" target="_blank">
    <svg viewBox="0 0 24 24" width="16" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
    WhatsApp
  </a>
</header>

<div id="chat"></div>

<div class="input-wrap">
  <textarea id="inp" rows="1" placeholder="Ketik pesan..." autocomplete="off"></textarea>
  <button id="send">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
  </button>
</div>

<script>
const chat = document.getElementById('chat')
const inp  = document.getElementById('inp')
const send = document.getElementById('send')
const SESSION = 'web-' + Math.random().toString(36).slice(2)

// ── Gate: kode akses ──
const gate = document.getElementById('gate')
const gateInput = document.getElementById('gateInput')
const gateBtn = document.getElementById('gateBtn')
const gateErr = document.getElementById('gateErr')
let API_KEY = localStorage.getItem('nova_api_key') || ''

function showGate(msg) {
  gateErr.textContent = msg || ''
  gate.classList.remove('hidden')
  gateInput.focus()
}
function hideGate() {
  gate.classList.add('hidden')
}
if (API_KEY) hideGate(); else showGate()

async function trySaveKey() {
  const val = gateInput.value.trim()
  if (!val) return
  gateBtn.disabled = true
  gateErr.textContent = ''
  try {
    // Validasi dengan ping ke /chat pakai pesan kosong-ish, tapi cara paling
    // murah: langsung anggap valid dan biarkan pesan pertama yang membuktikan.
    // Kalau nanti /chat balas 401, akan diminta ulang otomatis (lihat sendMsg).
    localStorage.setItem('nova_api_key', val)
    API_KEY = val
    hideGate()
  } finally {
    gateBtn.disabled = false
  }
}
gateBtn.addEventListener('click', trySaveKey)
gateInput.addEventListener('keydown', e => { if (e.key === 'Enter') trySaveKey() })

// Auto-resize textarea
inp.addEventListener('input', () => {
  inp.style.height = 'auto'
  inp.style.height = Math.min(inp.scrollHeight, 120) + 'px'
})

function now() {
  return new Date().toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' })
}

function addMsg(text, role) {
  const wrap = document.createElement('div')
  wrap.className = 'msg ' + role
  wrap.innerHTML = `<div class="bubble">${escHtml(text)}</div><span class="time">${now()}</span>`
  chat.appendChild(wrap)
  chat.scrollTop = chat.scrollHeight
  return wrap
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
}

function showTyping() {
  const w = document.createElement('div')
  w.className = 'msg ai typing'
  w.innerHTML = '<div class="bubble"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>'
  chat.appendChild(w)
  chat.scrollTop = chat.scrollHeight
  return w
}

async function sendMsg() {
  const text = inp.value.trim()
  if (!text) return
  if (!API_KEY) { showGate('Masukkan kode akses dulu.'); return }
  inp.value = ''
  inp.style.height = 'auto'
  send.disabled = true

  addMsg(text, 'user')
  const typing = showTyping()

  try {
    const res = await fetch('/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'X-Api-Key': API_KEY },
      body: JSON.stringify({ session_id: SESSION, message: text })
    })
    if (res.status === 401) {
      typing.remove()
      localStorage.removeItem('nova_api_key')
      API_KEY = ''
      showGate('Kode akses salah atau kadaluarsa, coba lagi.')
      send.disabled = false
      return
    }
    if (res.status === 429) {
      typing.remove()
      addMsg('⏳ Kebanyakan pesan, tunggu sebentar ya.', 'ai')
      send.disabled = false
      return
    }
    const data = await res.json()
    typing.remove()
    addMsg(data.reply || data.error || '(Tidak ada respons)', 'ai')
  } catch {
    typing.remove()
    addMsg('⚠️ Gagal terhubung ke server.', 'ai')
  }
  send.disabled = false
  inp.focus()
}

send.addEventListener('click', sendMsg)
inp.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMsg() }
})

// Greeting
addMsg('Halo! Ada yang bisa saya bantu? 😊', 'ai')
inp.focus()
</script>
</body>
</html>
